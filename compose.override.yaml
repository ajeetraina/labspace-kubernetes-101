services:
  configurator:
    environment:
      PROJECT_CLONE_URL: https://github.com/ajeetraina/labspace-kubernetes-101

  workspace:
    # The SDLC base ships a real k3s cluster, a container registry, and Traefik.
    # The base workspace image (Docker CLI + kubectl pre-configured) is all this
    # Kubernetes fundamentals lab needs.
    image: dockersamples/labspace-workspace-base
    environment:
      # This is a pure Kubernetes lab — it does not use the Gitea CI/CD pipeline,
      # so skip the automatic CI secret setup.
      SKIP_CI_SECRET_SETUP: "true"
